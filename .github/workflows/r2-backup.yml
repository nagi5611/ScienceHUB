# sciencehub-files → sciencehub-files-backup/<YYYY>/<MM>/<DD>/ （rclone・日次世代バックアップ）
# D1 sciencehub-db（本番）→ R2: .../d1/sciencehub-db.sql + sciencehub-db-backup へ復元
name: Backup R2 Storage and D1

on:
  schedule:
    # 毎日 04:00 JST（19:00 UTC）
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run only (list changes, no copy)
        type: boolean
        default: false
      backup_date:
        description: Backup folder (YYYY/MM/DD in JST). Empty = today
        required: false
        type: string

concurrency:
  group: sciencehub-r2-backup
  cancel-in-progress: false

jobs:
  backup-r2:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read

    env:
      R2_SOURCE_BUCKET: sciencehub-files
      R2_BACKUP_BUCKET: sciencehub-files-backup
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_SOURCE_DATABASE_NAME: sciencehub-db
      D1_SOURCE_DATABASE_ID: 1cce62b0-51f4-4619-9207-6a808557984c
      D1_BACKUP_DATABASE_NAME: sciencehub-db-backup
      D1_BACKUP_DATABASE_ID: 9f81acc1-11f9-4147-99ec-b22274c8abf5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate secrets
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is required"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is required for D1 export"
            exit 1
          fi
          if [ -z "${{ secrets.R2_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY secrets are required"
            exit 1
          fi

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone (R2)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.config/rclone
          {
            echo '[r2]'
            echo 'type = s3'
            echo 'provider = Cloudflare'
            echo "access_key_id = ${R2_ACCESS_KEY_ID}"
            echo "secret_access_key = ${R2_SECRET_ACCESS_KEY}"
            echo "endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo 'acl = private'
          } > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

      - name: Resolve backup date (JST)
        id: date
        env:
          INPUT_DATE: ${{ github.event.inputs.backup_date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            if ! echo "$INPUT_DATE" | grep -Eq '^[0-9]{4}/[0-9]{2}/[0-9]{2}$'; then
              echo "::error::backup_date must be YYYY/MM/DD"
              exit 1
            fi
            BACKUP_DATE="$INPUT_DATE"
          else
            BACKUP_DATE="$(TZ=Asia/Tokyo date +%Y/%m/%d)"
          fi
          echo "backup_date=$BACKUP_DATE" >> "$GITHUB_OUTPUT"
          echo "Backup destination: r2:${R2_BACKUP_BUCKET}/${BACKUP_DATE}/"

      - name: Copy R2 bucket to dated backup prefix
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          DEST="r2:${R2_BACKUP_BUCKET}/${{ steps.date.outputs.backup_date }}/"
          ARGS=(
            copy
            "r2:${R2_SOURCE_BUCKET}"
            "$DEST"
            --progress
            --stats-one-line
            --stats=30s
            --transfers=32
            --checkers=16
            --fast-list
            --size-only
            --s3-chunk-size=64M
          )
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          echo "Running: rclone ${ARGS[*]}"
          rclone "${ARGS[@]}"

      - name: Export production D1, upload to R2, restore to backup D1
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          BACKUP_DATE="${{ steps.date.outputs.backup_date }}"
          EXPORT_DIR="${RUNNER_TEMP}/d1-export"
          EXPORT_FILE="${EXPORT_DIR}/${D1_SOURCE_DATABASE_NAME}.sql"
          IMPORT_FILE="${EXPORT_DIR}/${D1_SOURCE_DATABASE_NAME}-import.sql"
          DROP_FILE="${EXPORT_DIR}/drop-tables.sql"
          R2_DEST="r2:${R2_BACKUP_BUCKET}/${BACKUP_DATE}/d1/${D1_SOURCE_DATABASE_NAME}.sql"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: would export D1 '${D1_SOURCE_DATABASE_NAME}' (${D1_SOURCE_DATABASE_ID})"
            echo "Dry run: would upload to ${R2_DEST}"
            echo "Dry run: would restore into '${D1_BACKUP_DATABASE_NAME}' (${D1_BACKUP_DATABASE_ID})"
            exit 0
          fi

          mkdir -p "$EXPORT_DIR"

          echo "Exporting production D1 '${D1_SOURCE_DATABASE_NAME}' (${D1_SOURCE_DATABASE_ID})"
          npx wrangler d1 export "${D1_SOURCE_DATABASE_NAME}" \
            --remote \
            --output "$EXPORT_FILE" \
            -y

          echo "Uploading D1 export to ${R2_DEST}"
          rclone copyto "$EXPORT_FILE" "$R2_DEST" --progress

          echo "Preparing import SQL (disable FK checks during restore)"
          {
            echo "PRAGMA foreign_keys=OFF;"
            cat "$EXPORT_FILE"
            echo "PRAGMA foreign_keys=ON;"
          } > "$IMPORT_FILE"

          echo "Dropping existing tables in backup D1 '${D1_BACKUP_DATABASE_NAME}'"
          TABLES_JSON="$(npx wrangler d1 execute "${D1_BACKUP_DATABASE_NAME}" --remote --json --command \
            "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%' AND name NOT LIKE '_cf_%';")"
          {
            echo "PRAGMA foreign_keys=OFF;"
            echo "$TABLES_JSON" | jq -r '.[0].results[]?.name // empty | select(length > 0) | "DROP TABLE IF EXISTS \"\(.)\";"'
            echo "PRAGMA foreign_keys=ON;"
          } > "$DROP_FILE"

          if grep -q '^DROP TABLE' "$DROP_FILE"; then
            npx wrangler d1 execute "${D1_BACKUP_DATABASE_NAME}" --remote --file "$DROP_FILE" -y
          fi

          echo "Restoring export into backup D1 '${D1_BACKUP_DATABASE_NAME}' (${D1_BACKUP_DATABASE_ID})"
          npx wrangler d1 execute "${D1_BACKUP_DATABASE_NAME}" --remote --file "$IMPORT_FILE" -y

      - name: Summary
        if: always()
        run: |
          {
            echo "### R2 backup"
            echo ""
            echo "- Source: \`${R2_SOURCE_BUCKET}\`"
            echo "- Destination: \`${R2_BACKUP_BUCKET}/${{ steps.date.outputs.backup_date }}/\`"
            echo "- Dry run: \`${{ github.event.inputs.dry_run || 'false' }}\`"
            echo ""
            echo "### D1 backup"
            echo ""
            echo "- Source (production): \`${D1_SOURCE_DATABASE_NAME}\` (\`${D1_SOURCE_DATABASE_ID}\`)"
            echo "- R2 archive: \`${R2_BACKUP_BUCKET}/${{ steps.date.outputs.backup_date }}/d1/${D1_SOURCE_DATABASE_NAME}.sql\`"
            echo "- Backup D1: \`${D1_BACKUP_DATABASE_NAME}\` (\`${D1_BACKUP_DATABASE_ID}\`)"
          } >> "$GITHUB_STEP_SUMMARY"
