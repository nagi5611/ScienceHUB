# sciencehub-files → sciencehub-files-backup/<YYYY>/<MM>/<DD>/ （rclone・日次世代バックアップ）
name: Backup R2 Storage

on:
  schedule:
    # 毎日 04:00 JST（19:00 UTC）
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run only (list changes, no copy)
        type: boolean
        default: false
      backup_date:
        description: Backup folder (YYYY/MM/DD in JST). Empty = today
        required: false
        type: string

concurrency:
  group: sciencehub-r2-backup
  cancel-in-progress: false

jobs:
  backup-r2:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read

    env:
      R2_SOURCE_BUCKET: sciencehub-files
      R2_BACKUP_BUCKET: sciencehub-files-backup
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Validate secrets
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is required"
            exit 1
          fi
          if [ -z "${{ secrets.R2_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY secrets are required"
            exit 1
          fi

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone (R2)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.config/rclone
          {
            echo '[r2]'
            echo 'type = s3'
            echo 'provider = Cloudflare'
            echo "access_key_id = ${R2_ACCESS_KEY_ID}"
            echo "secret_access_key = ${R2_SECRET_ACCESS_KEY}"
            echo "endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
            echo 'acl = private'
          } > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

      - name: Resolve backup date (JST)
        id: date
        env:
          INPUT_DATE: ${{ github.event.inputs.backup_date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            if ! echo "$INPUT_DATE" | grep -Eq '^[0-9]{4}/[0-9]{2}/[0-9]{2}$'; then
              echo "::error::backup_date must be YYYY/MM/DD"
              exit 1
            fi
            BACKUP_DATE="$INPUT_DATE"
          else
            BACKUP_DATE="$(TZ=Asia/Tokyo date +%Y/%m/%d)"
          fi
          echo "backup_date=$BACKUP_DATE" >> "$GITHUB_OUTPUT"
          echo "Backup destination: r2:${R2_BACKUP_BUCKET}/${BACKUP_DATE}/"

      - name: Copy R2 bucket to dated backup prefix
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          DEST="r2:${R2_BACKUP_BUCKET}/${{ steps.date.outputs.backup_date }}/"
          ARGS=(
            copy
            "r2:${R2_SOURCE_BUCKET}"
            "$DEST"
            --progress
            --stats-one-line
            --stats=30s
            --transfers=32
            --checkers=16
            --fast-list
            --size-only
            --s3-chunk-size=64M
          )
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          echo "Running: rclone ${ARGS[*]}"
          rclone "${ARGS[@]}"

      - name: Summary
        if: always()
        run: |
          {
            echo "### R2 backup"
            echo ""
            echo "- Source: \`${R2_SOURCE_BUCKET}\`"
            echo "- Destination: \`${R2_BACKUP_BUCKET}/${{ steps.date.outputs.backup_date }}/\`"
            echo "- Dry run: \`${{ github.event.inputs.dry_run || 'false' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
