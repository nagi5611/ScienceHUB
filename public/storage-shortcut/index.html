<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png">
  <meta name="theme-color" content="#f38020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ScienceHUB">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>フォルダを開く — ScienceHUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/share.css">
</head>
<body class="share-body">
  <main class="share-page" id="shortcut-page">
    <header class="share-header">
      <p class="share-brand">ScienceHUB</p>
      <h1 class="share-title">クラウドストレージ</h1>
    </header>

    <div class="share-card" id="shortcut-loading" role="status">
      <p>フォルダを開いています…</p>
    </div>

    <div class="share-card share-card--error" id="shortcut-error" hidden>
      <p class="share-error-text" id="shortcut-error-text"></p>
      <p><a href="/">ダッシュボードに戻る</a></p>
    </div>
  </main>

  <script type="module" src="/storage-shortcut/shortcut.js"></script>
  <script src="/js/pwa-register.js" type="module"></script>
</body>
</html>
