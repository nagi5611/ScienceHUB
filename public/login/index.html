<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | ScienceHUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="login-page-body">
  <header class="site-header login-page-header">
    <div class="header-inner login-header-inner">
      <a href="/" class="site-title">Science<span>HUB</span></a>
    </div>
  </header>

  <main class="login-page-main">
    <div class="login-page-layout">
      <section class="login-hero">
        <div class="login-hero-accent" aria-hidden="true"></div>
        <div class="login-hero-layers" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="login-hero-inner">
          <p class="login-hero-school">MMH Virtual</p>
          <p class="login-hero-club">科学研究プラットフォーム</p>
          <h2 class="login-hero-title">Science<span>HUB</span></h2>
          <p class="login-hero-lead">
            ファイル共有、プロジェクト管理、スケジュール管理を、
            学校や研究機関のチームがすぐ使える形でまとめます。
          </p>
          <p class="login-hero-note">アカウントをお持ちでない場合はサインアップからゲストとして登録できます。</p>
        </div>
      </section>

      <div class="login-page-form-col">
        <div class="auth-page-wrap">
          <div id="auth-main-card">
            <div class="auth-tabs" role="tablist">
              <button type="button" class="auth-tab active" data-auth-tab="login" role="tab">ログイン</button>
              <button type="button" class="auth-tab" data-auth-tab="signup" role="tab">サインアップ</button>
            </div>

            <div class="auth-card">
              <div id="auth-alert"></div>

              <div class="auth-oauth auth-oauth-row">
                <button type="button" class="auth-oauth-btn auth-oauth-btn-icon" id="auth-google-btn" aria-label="Googleでログイン"></button>
                <button type="button" class="auth-oauth-btn auth-oauth-btn-icon" id="auth-microsoft-btn" aria-label="Microsoftでログイン"></button>
              </div>

              <p class="auth-divider"><span>またはメールアドレス</span></p>

              <div class="auth-panels">
                <div id="login-panel" class="auth-tab-panel">
                  <form id="login-form" class="auth-form">
                    <div class="form-group">
                      <label for="login-email">メールアドレス</label>
                      <input type="email" id="login-email" name="email" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                      <label for="login-password">パスワード</label>
                      <input type="password" id="login-password" name="password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="auth-submit-btn" id="login-submit-btn">ログイン</button>
                  </form>
                </div>

                <div id="signup-panel" class="auth-tab-panel is-inactive">
                  <form id="signup-form" class="auth-form">
                    <div class="form-row">
                      <div class="form-group">
                        <label for="signup-username">ユーザー名</label>
                        <input type="text" id="signup-username" name="username" autocomplete="username" required minlength="2" maxlength="32" pattern="[a-zA-Z0-9_-]+">
                      </div>
                      <div class="form-group">
                        <label for="signup-display-name">表示名</label>
                        <input type="text" id="signup-display-name" name="display_name" autocomplete="name" required maxlength="64">
                      </div>
                    </div>
                    <div class="form-group">
                      <label for="signup-email">メールアドレス</label>
                      <input type="email" id="signup-email" name="email" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                      <label for="signup-password">パスワード</label>
                      <input type="password" id="signup-password" name="password" autocomplete="new-password" required minlength="8">
                    </div>
                    <div class="form-group">
                      <label for="signup-password-confirm">パスワード（確認）</label>
                      <input type="password" id="signup-password-confirm" name="password_confirm" autocomplete="new-password" required minlength="8">
                    </div>
                    <p class="hint signup-hint">ゲストとして登録されます。管理者が後からロールを変更できます。</p>
                    <button type="submit" class="auth-submit-btn" id="signup-submit-btn">サインアップ</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/login.js" type="module"></script>
</body>
</html>
