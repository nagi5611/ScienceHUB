<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png">
  <meta name="theme-color" content="#f38020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ScienceHUB">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>松山南高校ばーちゃるず提供サービス稼働状況</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    }
    .border-orange { border-color: #ff6b35; }
    .text-orange { color: #ff6b35; }
    .bg-orange { background-color: #ff6b35; }
    .hover\:bg-orange-dark:hover { background-color: #e5581f; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #ff6b35; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #e5581f; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex items-center gap-3">
      <i class="fas fa-heartbeat text-2xl text-orange" aria-hidden="true"></i>
      <div>
        <h1 class="text-lg sm:text-xl font-bold text-gray-900 leading-tight">松山南高校ばーちゃるず提供サービス稼働状況</h1>
        <p class="text-xs sm:text-sm text-gray-500 mt-0.5">10分ごとに自動再チェックされます</p>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
    <div id="meta" class="mb-6 text-sm text-gray-600"></div>
    <div id="list" class="space-y-3"></div>
    <p id="err" class="hidden mt-4 text-sm text-red-700 bg-red-100 border border-red-500 rounded-lg px-4 py-3"></p>
  </main>

  <script type="module" src="/js/status.js"></script>
  <script src="/js/pwa-register.js" type="module"></script>
</body>
</html>
